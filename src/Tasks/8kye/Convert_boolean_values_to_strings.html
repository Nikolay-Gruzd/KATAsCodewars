<body>
<!--
Complete the method that takes a boolean value and return a
"Yes" string for true, or a "No" string for false.

Завершите разработку метода, который принимает логическое значение
и возвращает строку "Yes" для значения true или строку "No" для значения false.
-->
<script>

    const boolT = true
    const boolF= false

    function boolToWord( bool ){
        return bool ? "yes" : "no"
    }

    console.log("Ответ:  " + boolToWord(boolT)) // = true
    console.log("Ответ:  " + boolToWord(boolF)) // = false
</script>
</body>
