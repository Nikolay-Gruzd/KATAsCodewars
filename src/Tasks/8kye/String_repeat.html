<!--
Write a function that accepts a non-negative integer n and a string s as parameters,
and returns a string of s repeated exactly n times.

6, "I"     -> "IIIIII"
5, "Hello" -> "HelloHelloHelloHelloHello"

Напишите функцию, которая принимает неотрицательное целое число n и строку s в качестве параметров
и возвращает строку из s, повторяющуюся ровно n раз.
-->
<script>

    const n = 5
    const s = 'hi '

    function repeatStr (n, s) {
        // let res = ''
        // for (let i = 0; i < n; i++) {
        //     res += s;
        // }
        // return res
        return s.repeat(n)
    }

    console.log("Ответ:  " + repeatStr(n, s)) // = 0
</script>
