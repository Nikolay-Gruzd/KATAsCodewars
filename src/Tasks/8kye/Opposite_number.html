<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<!--
Very simple, given a number, find its opposite (additive inverse).

1: -1
14: -14
-34: 34

Очень просто, задав число, найти его противоположность (аддитивную инверсию).
-->
<script>

    const number = -10

    function opposite(number) {
        return -number
    }

    console.log(`${number} => `   + opposite(number)) // = 0
</script>
</body>
</html>
