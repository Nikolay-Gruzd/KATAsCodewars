<body>
<!--
In this simple assignment you are given a number and have to make
it negative. But maybe the number is already negative?

В этом простом задании вам дано число, и вы должны сделать его
отрицательным. Но может быть, это число уже отрицательное?
-->
<script>
    function makeNegative(num) {
        return num <= 0 ? num : -num
    }

    console.log(makeNegative(0)) // = 0
    console.log(makeNegative(-111)) // = -111
</script>
</body>
</html>
